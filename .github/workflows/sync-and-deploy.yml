name: Sync And Deploy

on:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:
    inputs:
      sync_mode:
        description: "Режим синхронизации"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
          - bootstrap

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "my-miku-guide-pages"
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: |
          MODE="${{ github.event.inputs.sync_mode || 'incremental' }}"
          if [ "$MODE" = "incremental" ]; then
            npm run sync
          else
            npm run "sync:$MODE"
          fi

      - name: Commit generated snapshot
        run: |
          git add data README.md content src package.json package-lock.json astro.config.mjs tsconfig.json .gitignore
          git add .github/workflows/sync-and-deploy.yml

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh VocaDB snapshot"
          git push

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
